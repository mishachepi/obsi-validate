site_name: Obsidian Property Validator
site_description: Obsidian plugin that validates vault frontmatter against entity/property schemas
site_url: https://obsi-validate.mchep.dev/

repo_url: https://github.com/mishachepi/obsi-validate
repo_name: mishachepi/obsi-validate

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - About: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Schema reference: schema-reference.md
  - CLI: cli.md
  - Architecture: architecture.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
